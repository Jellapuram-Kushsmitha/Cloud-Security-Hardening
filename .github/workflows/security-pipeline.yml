name: Complete Security Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'    # every Monday 6am — weekly full scan

jobs:

  # ─── JOB 1: Secret Detection ──────────────────────
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # ← this is the key line — fetches full history

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified
        continue-on-error: false

  # ─── JOB 2: IaC Scanning ──────────────────────────
  iac-scan:
    name: Terraform Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4


      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          soft_fail: false
          output_format: cli

  # ─── JOB 3: Container Scanning ────────────────────
  container-scan:
    name: Container CVE Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        working-directory: docker
        run: docker build -t app:${{ github.sha }} .

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

  # ─── JOB 4: Dependency Check ──────────────────────
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: CRITICAL

  # ─── FINAL: Security Gate ─────────────────────────
  security-gate:
    name: Security Gate — All Checks Must Pass
    needs:
      - secret-scan
      - iac-scan
      - container-scan
      - dependency-scan
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check all security jobs passed
        run: |
          if [[ "${{ needs.secret-scan.result }}" != "success" || \
                "${{ needs.iac-scan.result }}" != "success" || \
                "${{ needs.container-scan.result }}" != "success" || \
                "${{ needs.dependency-scan.result }}" != "success" ]]; then
            echo "SECURITY GATE FAILED"
            echo "One or more security scans failed"
            echo "Secret scan: ${{ needs.secret-scan.result }}"
            echo "IaC scan: ${{ needs.iac-scan.result }}"
            echo "Container scan: ${{ needs.container-scan.result }}"
            echo "Dependency scan: ${{ needs.dependency-scan.result }}"
            exit 1
          fi
          echo "All security checks passed — deployment approved"
