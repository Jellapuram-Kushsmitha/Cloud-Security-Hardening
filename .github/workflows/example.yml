name: Example workflow        # displayed in GitHub UI

on:                           # what triggers this
  push:                       # run on every push
    branches: [main]          # only on main branch
  pull_request:               # also on pull requests
    branches: [main]

jobs:                         # list of jobs
  my-job:                     # job name
    runs-on: ubuntu-latest    # what OS to run on

    steps:
      - name: Check out code  # step description
        uses: actions/checkout@v4   # reusable action

      - name: Run a command
        run: echo "Hello from GitHub Actions"

      - name: Run multiple commands
        run: |
          echo "Line 1"
          echo "Line 2"
          ls -la
